
# Database Configuration
spring.application.name=car-rental
spring.datasource.url=jdbc:mysql://localhost:3307/mr_rent
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
# Use exact table/column names from @Table/@Column annotations (preserves PascalCase)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Server Configuration
server.port=8080

# JWT Configuration
jwt.secret=CarRentalSuperSecretKeyForHMACSHA256Algorithm32CharsMin!
jwt.expiration=86400000
